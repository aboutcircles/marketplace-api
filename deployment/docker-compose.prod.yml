# Production compose — uses pre-built images from Docker Hub.
# Layered with docker-compose.override.yml (Ansible-rendered) for per-host config.
services:
  market-api:
    container_name: market-api
    image: aboutcircles/market-api:${MARKET_API_TAG:-latest}
    build:
      context: ..
      dockerfile: market-api.Dockerfile
    restart: unless-stopped
    entrypoint: ["dotnet", "Circles.Market.Api.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: ${MARKET_API_PORT}
      CIRCLES_AGG_IPFS_READ_TIMEOUT_MS: 1000
      MARKET_ODOO_ADAPTER_PORT: ${MARKET_ODOO_ADAPTER_PORT}
      MARKET_CODE_DISPENSER_PORT: ${MARKET_CODE_DISPENSER_PORT}
      MARKET_UNLOCK_ADAPTER_PORT: ${MARKET_UNLOCK_ADAPTER_PORT}
      MARKET_ADMIN_PORT: ${MARKET_ADMIN_PORT}
      # Adapter admin ports: host .env uses MARKET_*_ADMIN_PORT prefix;
      # containers read the shorter names (ODOO_ADMIN_PORT, etc.) via Program.cs.
      ODOO_ADMIN_PORT: ${MARKET_ODOO_ADMIN_PORT}
      CODEDISP_ADMIN_PORT: ${MARKET_CODEDISP_ADMIN_PORT}
      UNLOCK_ADMIN_PORT: ${MARKET_UNLOCK_ADMIN_PORT}
      CIRCLES_SERVICE_KEY: ${CIRCLES_SERVICE_KEY}
      MARKET_OUTBOUND_HEADER_NAME: ${MARKET_OUTBOUND_HEADER_NAME-}
      MARKET_ODOO_ADAPTER_ORIGIN: ${MARKET_ODOO_ADAPTER_ORIGIN-}
      MARKET_CODE_DISPENSER_ORIGIN: ${MARKET_CODE_DISPENSER_ORIGIN-}
      MARKET_UNLOCK_ADAPTER_ORIGIN: ${MARKET_UNLOCK_ADAPTER_ORIGIN-}
      MARKET_ODOO_ADAPTER_TOKEN: ${MARKET_ODOO_ADAPTER_TOKEN-}
      MARKET_CODE_DISPENSER_TOKEN: ${MARKET_CODE_DISPENSER_TOKEN-}
      MARKET_UNLOCK_ADAPTER_TOKEN: ${MARKET_UNLOCK_ADAPTER_TOKEN-}
      ORDER_TRACE_ENABLED: ${ORDER_TRACE_ENABLED-false}
      ORDER_TRACE_QUEUE_CAPACITY: ${ORDER_TRACE_QUEUE_CAPACITY-5000}
      ORDER_TRACE_BATCH_SIZE: ${ORDER_TRACE_BATCH_SIZE-100}
      ORDER_TRACE_FLUSH_INTERVAL_MS: ${ORDER_TRACE_FLUSH_INTERVAL_MS-1000}
      ORDER_TRACE_DB_TIMEOUT_MS: ${ORDER_TRACE_DB_TIMEOUT_MS-500}
      ORDER_TRACE_POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${DB_ORDERTRACE};Username=${DB_ORDERTRACE_USER};Password=${DB_ORDERTRACE_PASSWORD}
      RPC: ${RPC}
      CIRCLES_RPC: ${CIRCLES_RPC:-}
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${DB_MARKET_API};Username=${DB_MARKET_API_USER};Password=${DB_MARKET_API_PASSWORD}
      PINNING_SERVICE_URL: ${PINNING_SERVICE_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ODOO_ADMIN_INTERNAL_URL: http://market-adapter-odoo:${MARKET_ODOO_ADMIN_PORT}
      CODEDISP_ADMIN_INTERNAL_URL: http://market-adapter-codedispenser:${MARKET_CODEDISP_ADMIN_PORT}
      UNLOCK_ADMIN_INTERNAL_URL: http://market-adapter-unlock:${MARKET_UNLOCK_ADMIN_PORT}
      ADMIN_PROXY_ALLOWED_HOSTS: market-adapter-odoo,market-adapter-codedispenser,market-adapter-unlock,localhost,127.0.0.1
      # Auth-service JWKS (RS256, sole authentication)
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-circles-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-api}
      # Admin authorization (address allowlist)
      ADMIN_ADDRESSES: ${ADMIN_ADDRESSES:-}
      # Admin CORS (comma-separated origins, or "*" for all)
      ADMIN_CORS_ALLOWED_ORIGINS: ${ADMIN_CORS_ALLOWED_ORIGINS:-*}
    env_file:
      - .env
    volumes:
      - .state/dpkeys:/root/.aspnet/DataProtection-Keys
    networks:
      - internal
      - egress
    ports:
      - "127.0.0.1:${MARKET_ADMIN_PORT}:${MARKET_ADMIN_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  market-api-health:
    container_name: market-api-health
    image: curlimages/curl:${CURL_TAG}
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - internal
    depends_on:
      market-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://market-api:${MARKET_API_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  market-adapter-odoo:
    container_name: market-adapter-odoo
    image: aboutcircles/market-adapter-odoo:${MARKET_ADAPTER_ODOO_TAG}
    build:
      context: ..
      dockerfile: market-adapter-odoo.Dockerfile
    restart: unless-stopped
    entrypoint: ["dotnet", "Circles.Market.Adapters.Odoo.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: ${MARKET_ODOO_ADAPTER_PORT}
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${DB_ODOO};Username=${DB_ODOO_USER};Password=${DB_ODOO_PASSWORD}
      CIRCLES_SERVICE_KEY: ${CIRCLES_SERVICE_KEY}
      ODOO_ADMIN_PORT: ${MARKET_ODOO_ADMIN_PORT}  # maps host MARKET_ODOO_ADMIN_PORT → container ODOO_ADMIN_PORT
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-circles-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-api}
    env_file:
      - .env
    networks:
      - internal
      - egress
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  market-adapter-odoo-health:
    container_name: market-adapter-odoo-health
    image: curlimages/curl:${CURL_TAG}
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - internal
    depends_on:
      market-adapter-odoo:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://market-adapter-odoo:${MARKET_ODOO_ADAPTER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  market-adapter-codedispenser:
    container_name: market-adapter-codedispenser
    image: aboutcircles/market-adapter-codedispenser:${MARKET_ADAPTER_CODEDISP_TAG}
    build:
      context: ..
      dockerfile: market-adapter-codedispenser.Dockerfile
    restart: unless-stopped
    entrypoint: ["dotnet", "Circles.Market.Adapters.CodeDispenser.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: ${MARKET_CODE_DISPENSER_PORT}
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${DB_CODEDISP};Username=${DB_CODEDISP_USER};Password=${DB_CODEDISP_PASSWORD}
      CIRCLES_SERVICE_KEY: ${CIRCLES_SERVICE_KEY}
      CODE_POOLS_DIR: ${CODE_POOLS_DIR}
      CODEDISP_ADMIN_PORT: ${MARKET_CODEDISP_ADMIN_PORT}  # maps host MARKET_CODEDISP_ADMIN_PORT → container CODEDISP_ADMIN_PORT
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-circles-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-api}
    env_file:
      - .env
    networks:
      - internal
      - egress
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  market-adapter-codedispenser-health:
    container_name: market-adapter-codedispenser-health
    image: curlimages/curl:${CURL_TAG}
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - internal
    depends_on:
      market-adapter-codedispenser:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://market-adapter-codedispenser:${MARKET_CODE_DISPENSER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  market-adapter-unlock:
    container_name: market-adapter-unlock
    image: aboutcircles/market-adapter-unlock:${MARKET_ADAPTER_UNLOCK_TAG}
    build:
      context: ..
      dockerfile: market-adapter-unlock.Dockerfile
    restart: unless-stopped
    entrypoint: ["dotnet", "Circles.Market.Adapters.Unlock.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: ${MARKET_UNLOCK_ADAPTER_PORT}
      POSTGRES_CONNECTION: Host=postgres;Port=5432;Database=${DB_UNLOCK};Username=${DB_UNLOCK_USER};Password=${DB_UNLOCK_PASSWORD}
      CIRCLES_SERVICE_KEY: ${CIRCLES_SERVICE_KEY}
      UNLOCK_ADMIN_PORT: ${MARKET_UNLOCK_ADMIN_PORT}  # maps host MARKET_UNLOCK_ADMIN_PORT → container UNLOCK_ADMIN_PORT
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-circles-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-api}
    env_file:
      - .env
    networks:
      - internal
      - egress
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  market-adapter-unlock-health:
    container_name: market-adapter-unlock-health
    image: curlimages/curl:${CURL_TAG}
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]
    networks:
      - internal
    depends_on:
      market-adapter-unlock:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://market-adapter-unlock:${MARKET_UNLOCK_ADAPTER_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  init-db:
    container_name: market-init-db
    image: postgres:${POSTGRES_TAG}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/provision-dbs.sh:/scripts/provision-dbs.sh:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_MARKET_API=${DB_MARKET_API}
      - DB_CODEDISP=${DB_CODEDISP}
      - DB_ODOO=${DB_ODOO}
      - DB_UNLOCK=${DB_UNLOCK}
      - DB_ORDERTRACE=${DB_ORDERTRACE}
      - DB_MARKET_API_USER=${DB_MARKET_API_USER}
      - DB_CODEDISP_USER=${DB_CODEDISP_USER}
      - DB_ODOO_USER=${DB_ODOO_USER}
      - DB_UNLOCK_USER=${DB_UNLOCK_USER}
      - DB_ORDERTRACE_USER=${DB_ORDERTRACE_USER}
      - DB_MARKET_API_PASSWORD=${DB_MARKET_API_PASSWORD}
      - DB_CODEDISP_PASSWORD=${DB_CODEDISP_PASSWORD}
      - DB_ODOO_PASSWORD=${DB_ODOO_PASSWORD}
      - DB_UNLOCK_PASSWORD=${DB_UNLOCK_PASSWORD}
      - DB_ORDERTRACE_PASSWORD=${DB_ORDERTRACE_PASSWORD}
    env_file:
      - .env
    command: ["sh", "/scripts/provision-dbs.sh"]
    networks:
      - internal
    restart: "no"

  postgres:
    container_name: market-db
    image: postgres:${POSTGRES_TAG}
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - 6666:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    container_name: market-nginx
    image: nginx:${NGINX_TAG}
    restart: unless-stopped
    ports:
      - "18080:18080"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    env_file:
      - .env
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
    networks:
      - public
      - internal
    depends_on:
      market-api-health:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  public:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.1.0.0/16
  egress:
    driver: bridge
    internal: false
    enable_ipv4: true
    ipam:
      config:
        - subnet: 10.2.0.0/24

volumes:
  pgdata: {}
