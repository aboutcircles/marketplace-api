services:
  market-api:
    build:
      context: ..
      dockerfile: Circles.Market/market-api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
      market-adapter-codedispenser:
        condition: service_started
    expose:
      - ${MARKET_API_PORT:-5084}
    env_file:
      - ../.env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # RPC endpoints: RPC for standard eth calls, CIRCLES_RPC for circles_query (optional, defaults to RPC)
      RPC: ${RPC:-https://rpc.aboutcircles.com/}
      CIRCLES_RPC: ${CIRCLES_RPC:-}
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION:-Host=postgres;Port=5432;Database=circles_market;Username=postgres;Password=postgres}
      IPFS_RPC_URL: ${IPFS_RPC_URL:-https://rpc.filebase.io/api/v0/}
      IPFS_RPC_BEARER: ${IPFS_RPC_BEARER:-}
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL:-https://cloudflare-ipfs.com/}
      PORT: ${MARKET_API_PORT:-5084}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # JWT authentication via external auth-service (RS256/JWKS)
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-https://staging.circlesubi.network/auth}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-circles-auth}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-market-api}
    networks:
      default:
      circles-gnosis:
        aliases:
          - market-api

  market-adapter-odoo:
    profiles: [odoo]  # Only starts when COMPOSE_PROFILES includes 'odoo'
    build:
      context: ..
      dockerfile: Circles.Market/market-adapter-odoo.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    expose:
      - ${ODOO_ADAPTER_PORT:-5678}
    env_file:
      - ../.env
    environment:
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION:-Host=postgres;Port=5432;Database=circles_market;Username=postgres;Password=postgres}
      PORT: ${ODOO_ADAPTER_PORT:-5678}

  market-adapter-codedispenser:
    build:
      context: ..
      dockerfile: Circles.Market/market-adapter-codedispenser.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    expose:
      - ${CODE_DISPENSER_PORT:-5680}
    env_file:
      - ../.env
    environment:
      POSTGRES_CONNECTION: ${POSTGRES_CONNECTION:-Host=postgres;Port=5432;Database=circles_market;Username=postgres;Password=postgres}
      CODE_POOLS_DIR: ${CODE_POOLS_DIR:-/app/pools}
      PORT: ${CODE_DISPENSER_PORT:-5680}
    volumes:
      - ${CODE_POOLS_HOST_DIR:-./code-pools}:${CODE_POOLS_DIR:-/app/pools}:ro
    networks:
      default:
      circles-gnosis:
        aliases:
          - market-adapter-codedispenser

  init-db:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./provision-dbs.sh:/scripts/provision-dbs.sh:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Single database for all market services
      DB_MARKET_API: ${DB_MARKET_API:-circles_market}
      DB_CODEDISP: ${DB_CODEDISP:-circles_market}
      DB_ODOO: ${DB_ODOO:-circles_market}
    command: ["sh", "/scripts/provision-dbs.sh"]
    restart: "no"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-circles_market}
    expose:
      - 5432
    volumes:
      - ../.state/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  circles-gnosis:
    external: true
